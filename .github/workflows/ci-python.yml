name: CI (Python)

on:
  push:
    branches: [develop, main]
    paths:
      - "packages/**"
      - "services/**/*.py"
      - "services/**/pyproject.toml"
      - "scripts/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/ci-python.yml"
  pull_request:
    paths:
      - "packages/**"
      - "services/**/*.py"
      - "services/**/pyproject.toml"
      - "scripts/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/ci-python.yml"

concurrency:
  group: ci-python-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --all-packages

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: mypy
        run: uv run mypy .

      - name: agent-core isolation check (no direct PMDF writes)
        run: uv run python scripts/check_agent_core_isolation.py

      - name: pytest
        run: uv run pytest
