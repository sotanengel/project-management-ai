repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        types_or: [ts, tsx, javascript, jsx, yaml, markdown, json]
        exclude: ^scripts/bootstrap_issues/

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]
        # pnpm-lock.yamlはパッケージ整合性ハッシュ(base64エンコードの
        # sha512等)を大量に含み、detect-secretsが高エントロピー文字列と
        # して誤検知するため除外する(実際のシークレットは含まれない)。
        exclude: ^scripts/bootstrap_issues/issues\.yaml$|pnpm-lock\.yaml$

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: check-yaml
      - id: end-of-file-fixer
