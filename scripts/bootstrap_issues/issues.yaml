          > FR-OP-01の自動停止と連動する。
          > AC-09:Tier-S月次コスト10万円以内、予算超過時の自動停止が動作

      - key: E11-5
        title: "[E11-5] Tier-S⇄Tier-L成果物互換検証"
        labels: [deferred]
        body: |
          ## 概要
          **本イシューは将来実装。現時点で着手しない。**

          データセット・LoRAアダプタ・KBスナップショット・PMDFバンドルが
          Tier-L⇄Tier-S間で相互に持ち込み可能であること、および
          「クラウドで学習し、GGUF変換してローカルで運用する」フローが
          成立することを検証する(ENV-C-01, ENV-C-02)。

          ## 想定対象ファイル(将来実装時)
          - `scripts/tier-s/export_artifacts_for_tier_l.sh`
          - `scripts/tier-l/import_artifacts_from_tier_s.sh`

          ## 受け入れ条件(将来実装時)
