                変換して持ち込み、正常に推論できることを確認する
          - [ ] PMDFバンドル・KBスナップショットがTier-S⇄Tier-L間で
                往復可能であることを確認する(E2-6/E2-7の機構を再利用)

          ## 依存
          [E11-1], [E8-8] 完了後(将来)

