      - key: E7-6
        title: "[E7-6] エージェント活動ログ画面"
        labels: ["phase:3"]
        body: |
          ## 概要
          実行中/完了タスク、使用モデル、根拠(参照KB/PMDF)、監査ログを
          閲覧・検索できる画面を実装する(FR-UI-04)。

          ## 対象ファイル
          - `services/web-ui/src/pages/ActivityLog.tsx`: E5-9の
            `GET /chat/tasks/{task_id}` およびタスク一覧API(E3-7の監査ログ
