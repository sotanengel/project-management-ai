  # =========================================================================
  # E8: 自己学習ループ [phase:4]
  # =========================================================================
  - key: E8
    title: "[E8] 自己学習ループ"
    labels: [epic, "phase:4"]
    body: |
      ## 概要
      「タスク生成→実行→評価→学習データ化→ファインチューニング→評価ゲート
      →昇格」の自己学習ループを実装する。本エピック配下の全サブイシューは
      **実GPU不要・モックでテスト可能**なことを前提とする(CPU上のtiny
      モデルでのスモークテストを含む)。実際のGPU学習・大規模ベンチマーク
      実行はローカル環境での人手検証(E10-4)に委ねる。

      ## 含まれるサブイシュー
      - E8-1 データセットスキーマと来歴管理
      - E8-2 タスク合成
      - E8-3 実行・軌跡記録
      - E8-4 ハイブリッド評価
      - E8-5 人間フィードバック取込と匿名化
      - E8-6 データセット化とオプトイン制御
      - E8-7 trainer QLoRA実装
      - E8-8 eval-runner評価ゲート+デプロイフック

      ## トレーサビリティ
      FR-SL-01〜10, DR-02〜05, MR-04 / 要件定義書 §5.6, §10
    subs:
      - key: E8-1
        title: "[E8-1] データセットスキーマと来歴管理"
        labels: ["phase:4"]
        body: |
          ## 概要
          学習データ(軌跡/SFT/DPOレコード)のスキーマを定義し、train/val/
          評価ゲート用データセットを厳格に分離する仕組みと、コンタミネー
          ション検知(ハッシュ照合)を実装する。

          ## 対象ファイル
          `packages/pmdf/src/pmdf/learning/` (学習データはPMDFそのものでは
          ないが、来歴管理の設計思想を共有するため同一パッケージ内に
          `learning` サブモジュールとして配置する。あるいは
          `packages/learning-data/` として独立パッケージ化してもよいが、
          本実装では前者を既定とする):
          - `schemas.py`(Pydanticモデル):
            - `TrajectoryRecord`: シナリオ入力、生徒モデルの推論過程
              (ステップ列)、ツール呼び出しログ、PMDF差分、使用モデル論理名、
              生成日時
            - `SftRecord`: `prompt`, `completion`, 由来
              (`trajectory_id`参照)
            - `DpoRecord`: `prompt`, `chosen`, `rejected`, 由来
              (人間フィードバックまたはルールベース不合格由来かを示す
              `origin: Literal["human_feedback", "rule_rejection"]`)
            - 全レコード共通: `provenance`(生成モデル・プロンプトテンプレート
              版・KB版・生成日時)を必須フィールドとする(DR-02)
          - `split.py`: `assign_split(records: list, ratios: dict) ->
            dict[str, list]` — train/val/gate(評価ゲート用)への厳格分離。
            一度split済みのレコードのシナリオ由来ハッシュ
            (`scenario_hash`)を記録し、同一シナリオ由来のレコードが
            異なるsplitに混入しないようにする
          - `contamination.py`: `detect_contamination(train: list, gate: list)
            -> list[ContaminationHit]` — シナリオテキストの正規化+ハッシュ
            (例: 空白正規化後のSHA-256)による完全一致検出、および
            将来的なn-gram重複検出のための拡張ポイント(本イシューでは
            完全一致検出のみ実装し、近似重複検出はTODOコメントで明記)

          ## 受け入れ条件
          - [ ] `TrajectoryRecord`/`SftRecord`/`DpoRecord` が
                `provenance` を必須フィールドとして持ち、欠落時に
                `ValidationError` が送出されることを確認する
          - [ ] `assign_split` が指定比率(例 train:val:gate = 0.8:0.1:0.1)
                でレコードを分割し、同一 `scenario_hash` を持つレコードが
                複数splitにまたがらないことを確認する
          - [ ] 意図的にtrainとgateへ同一シナリオ由来のレコードを混入させた
                テストデータで `detect_contamination` がヒットを報告する
                ことを確認する
          - [ ] 重複のないデータセットでは `detect_contamination` が空リストを
                返すことを確認する

          ## 依存
          [E2-3] 完了後

          ## 成果物
          `packages/pmdf/src/pmdf/learning/{schemas,split,
          contamination}.py`, 関連テスト

          ## トレーサビリティ
          DR-02, DR-03 / 要件定義書 §5.6, §10

          ## 要件書引用
          > DR-02:学習データは原則合成データとし、来歴(生成モデル・
          > プロンプト・KB版)を全件記録
          > DR-03:train/val/評価ゲート用を厳格分離し、コンタミネーション
          > 検知を行う

      - key: E8-2
        title: "[E8-2] タスク合成"
        labels: ["phase:4"]
        body: |
          ## 概要
          KBおよび匿名化済みPMDFからPdMシナリオ(優先順位判断、ロードマップ
          トレードオフ、実験解釈、リリース判断等の課題設定)を教師モデル
          (`pdm-teacher` 論理名)を用いて合成生成する(FR-SL-01)。

          ## 対象ファイル
          `services/agent-core/src/agent_core/learning/synthesize.py`
          (学習ループ関連機能は `agent-core` 内 `learning` サブパッケージに
          集約し、trainer/eval-runnerサービスとはデータファイル
          (JSONL等)を介して疎結合に連携する設計とする):
          - `synthesize_scenarios(kb_chunks: list, pmdf_samples: list,
            count: int, teacher_model: str = "pdm-teacher") ->
            list[Scenario]`:
            - E5-3のRAG検索結果とE6-1のKBメタデータ(domain/framework)を
              入力コンテキストとして教師モデルへプロンプトし、シナリオ
              (状況設定+課題+期待される回答種別)を生成
            - 各シナリオに `coverage_tags`(domain/frameworkの組み合わせ、
              FR-SL-01のカバレッジタグ要件)を付与
          - テストでは `respx` で教師モデル応答をモックし、固定応答から
            期待通りのScenarioオブジェクトが構築されることを確認する
            (実際の教師モデルAPI呼び出しは行わない)

          ## 受け入れ条件
          - [ ] モック教師モデル応答から `synthesize_scenarios` が
                指定件数のシナリオを生成することを確認する
          - [ ] 生成された各シナリオが `coverage_tags` を持ち、入力に
                含めたKBメタデータ(domain/framework)と対応していることを
                確認する
          - [ ] `provenance`(E8-1のスキーマ)に教師モデル論理名・生成日時が
                記録されることを確認する

          ## 依存
          [E8-1], [E6-2] 完了後

          ## 成果物
          `services/agent-core/src/agent_core/learning/synthesize.py`,
          関連テスト

          ## トレーサビリティ
          FR-SL-01 / 要件定義書 §5.6

          ## 要件書引用
          > FR-SL-01 タスク合成:KB+PMDF(匿名化済み)からPdMシナリオ
          > (プロダクト状況+課題:優先順位判断、ロードマップトレードオフ、
          > 実験解釈、リリース判断等)を合成生成する。教師モデル
          > (Tier-SではAPI)を使用してよい。

      - key: E8-3
        title: "[E8-3] 実行・軌跡記録"
        labels: ["phase:4"]
        body: |
          ## 概要
          生徒モデル(`pdm-student` 論理名)がE8-2の合成シナリオに回答し、
          推論過程・ツール呼び出し・PMDF差分を軌跡(trajectory)として記録
          する(FR-SL-02)。

          ## 対象ファイル
          `services/agent-core/src/agent_core/learning/execute.py`:
          - `execute_scenario(scenario: Scenario, student_model: str =
            "pdm-student") -> TrajectoryRecord`:
            - E5-1〜E5-9の業務グラフ(該当するもの)をシナリオに応じて
              呼び出し、実行過程の各ステップ(LLM呼び出し内容、ツール
              呼び出しの引数・結果、生成/更新されたPMDFエンティティの差分)
              を記録
            - サンドボックス実行: 本番のPMDFストアを汚染しないよう、
              一時的な隔離ストア(E3-2の `PmdfStore` をテスト用一時ディレクトリ
              で初期化したインスタンス)に対して実行する
          - テストでは生徒モデル応答・ツール呼び出しを全てモックし、
            `TrajectoryRecord` がE8-1のスキーマに適合する形で構築される
            ことを確認する

          ## 受け入れ条件
          - [ ] モック生徒モデル+モックツールで `execute_scenario` を実行し、
                `TrajectoryRecord` に推論過程・ツール呼び出しログ・PMDF差分
                が記録されることを確認する
          - [ ] 実行が一時隔離ストアに対して行われ、本番相当のストア
                (テストでは別インスタンスとして用意)に影響しないことを
                確認する
          - [ ] 生成された `TrajectoryRecord` がE8-1の `TrajectoryRecord`
                Pydanticモデルでバリデーションを通過することを確認する

          ## 依存
          [E8-2], [E5-1] 完了後

          ## 成果物
          `services/agent-core/src/agent_core/learning/execute.py`, 関連テスト

          ## トレーサビリティ
          FR-SL-02 / 要件定義書 §5.6

          ## 要件書引用
          > FR-SL-02 実行:生徒モデルがシナリオに回答し、軌跡(推論過程・
          > ツール呼び出し・PMDF差分)を記録する。

      - key: E8-4
        title: "[E8-4] ハイブリッド評価"
        labels: ["phase:4"]
        body: |
          ## 概要
          E8-3の軌跡をルールベース検証+LLM-as-Judgeのハイブリッドで採点
          する(FR-SL-03)。ルーブリックは価値中心の基準(誰にとっての価値か、
          アウトプット/アウトカム/価値の区別、トレードオフの明示)で定義
          する。

          ## 対象ファイル
          `services/agent-core/src/agent_core/learning/evaluate.py`:
          - `rule_based_checks(trajectory: TrajectoryRecord) ->
            RuleCheckResult`:
            - PMDFスキーマ適合(E2-1/E2-3の検証を再利用)
            - RICE/WSJF等の計算検算(E5-4の `calc_priority` 相当ロジックを
              再利用し、軌跡内のscoreが検算値と一致するか)
            - 受入基準の網羅性(storyのacceptance_criteriaが空でない、
              最低N件等のヒューリスティック)
            - Decision Recordの必須項目充足(E5-6の必須項目チェックを再利用)
          - `llm_judge_score(trajectory: TrajectoryRecord, judge_model: str =
            "pdm-judge") -> JudgeScore`:
            - ルーブリック(価値中心基準)をプロンプトテンプレートとして
              `packages/.../learning/rubrics/value_centric.md` に定義し、
              `pdm-judge` 論理名でスコアリング(観点: 誰にとっての価値か
              /アウトプット・アウトカム・価値の区別/トレードオフの明示、
              各観点1〜5点)
            - テストでは `respx` でジャッジモデル応答をモックする
          - `hybrid_evaluate(trajectory) -> EvaluationResult`: 両者を
            統合し、ルールベースで不合格(スキーマ不適合等)の場合は
            ジャッジスコアに関わらず不合格とする(ルールベースを最終防衛
            として優先する設計)

          ## 受け入れ条件
          - [ ] 正しいRICEスコアを持つ軌跡が `rule_based_checks` で合格
                することを確認する
          - [ ] 意図的に検算不一致のscoreを持つ軌跡が不合格になることを
                確認する
          - [ ] モックジャッジ応答から `llm_judge_score` が3観点のスコアを
                パースして返すことを確認する
          - [ ] ルールベース不合格の軌跡は、ジャッジスコアが高くても
                `hybrid_evaluate` の総合結果が不合格になることを確認する

          ## 依存
          [E8-3] 完了後

          ## 成果物
          `services/agent-core/src/agent_core/learning/evaluate.py`,
          `packages/pmdf/src/pmdf/learning/rubrics/value_centric.md`,
          関連テスト

          ## トレーサビリティ
          FR-SL-03 / 要件定義書 §5.6, 巻末注記(価値中心の成功定義)

          ## 要件書引用
          > FR-SL-03 評価:LLM-as-Judge+ルールベース検証(PMDFスキーマ適合、
          > RICE等の計算検算、受入基準の網羅、Decision Recordの必須項目)の
          > ハイブリッドで採点する。ルーブリックは価値中心の基準(誰に
          > とっての価値か、アウトプット/アウトカム/価値の区別、
          > トレードオフの明示)で定義する。

      - key: E8-5
        title: "[E8-5] 人間フィードバック取込と匿名化"
        labels: ["phase:4"]
        body: |
          ## 概要
          E3-6の承認/差し戻し実績を選好データ(DPOペア)として自動収集する。
          実運用データを用いる場合は固有名詞除去等の匿名化を必須とする
          (FR-SL-04)。

          ## 対象ファイル
          `services/agent-core/src/agent_core/learning/feedback_ingest.py`:
          - `collect_preference_pairs(approvals: list[Approval]) ->
            list[DpoRecord]`: E5-8の `feedback_queue/`(差し戻しペアJSONL)
            を読み込み、`chosen`(承認された/修正版内容)と `rejected`
            (元の起案内容)のペアとして `DpoRecord`(E8-1）を構築する
          - `anonymize.py`:
            - `anonymize_text(text: str) -> str`: 固有名詞除去
              (人名・組織名・メールアドレス等のパターンマッチ+簡易NER、
              日本語対応のため `ja_ginza` 等の軽量ライブラリまたは
              正規表現ベースのルールセットを利用。完全な匿名化保証は
              困難なため、既知の限界をコード内コメントに明記し、
              実運用データ利用時は人手レビューを推奨する旨をdocsに残す)
            - `DpoRecord` 生成時、`origin="human_feedback"` のレコードは
              必ず `anonymize_text` を通してから保存する

          ## 受け入れ条件
          - [ ] `feedback_queue/` のサンプルJSONL(差し戻し理由付きペアを
                含む)から `collect_preference_pairs` が `DpoRecord` を
                正しく構築することを確認する
          - [ ] 人名・組織名を含むテストテキストに対し `anonymize_text` が
                該当部分をマスクすることを確認する(既知のテストケース
                セットに対する回帰テスト)
          - [ ] `origin="human_feedback"` のレコードが未匿名化のまま
                保存されないことを保証するテスト(匿名化処理をスキップする
                コードパスが存在しないことの確認)がある

          ## 依存
          [E3-6], [E8-1] 完了後

          ## 成果物
          `services/agent-core/src/agent_core/learning/{feedback_ingest,
          anonymize}.py`, 関連テスト

          ## トレーサビリティ
          FR-SL-04 / 要件定義書 §5.6

          ## 要件書引用
          > FR-SL-04 人間フィードバックの取込:承認/差し戻し(FR-AU-03)の
          > 実績を選好データとして自動収集する(差し戻し理由つきペア)。
          > 実運用データを使う場合は匿名化・固有名詞除去を必須とする。

      - key: E8-6
        title: "[E8-6] データセット化とオプトイン制御"
        labels: ["phase:4"]
        body: |
          ## 概要
          E8-4の評価結果に基づき合格軌跡をSFTデータへ、不合格+修正版
          ペアおよび人間フィードバック(E8-5)をDPOデータへ振り分ける。
          プロダクト単位のオプトイン設定と、共有バンドル由来データの既定
          除外を実装する(FR-SL-05, FR-SL-10, DR-05)。

          ## 対象ファイル
          - `services/agent-core/src/agent_core/learning/dataset_builder.py`:
            - `build_sft_dataset(trajectories: list[TrajectoryRecord],
              evaluations: list[EvaluationResult]) -> list[SftRecord]`:
              合格軌跡のみをSFTレコード化
            - `build_dpo_dataset(rejected_trajectories: list, corrections:
              list, human_feedback: list[DpoRecord]) -> list[DpoRecord]`:
              不合格+修正版ペア、および人間フィードバック由来ペアを統合
          - `services/agent-core/src/agent_core/learning/opt_in.py`:
            - `ProductOptIn`(プロダクトid、`opt_in: bool`、設定日時)の
              永続化(api-server設定ストア相当、E3-8の自律レベル設定と
              同様の仕組みを流用)
            - `filter_by_opt_in(records: list, opt_ins: dict[str, bool]) ->
              list`: `product_id` を持つレコードのうち、オプトインされて
              いないプロダクト由来のものを除外
            - `is_from_shared_bundle(record) -> bool`: レコードの
              `provenance` に共有バンドルimport由来(E2-7/E3-9でインポート
              されたエンティティにはインポート元マーカーを付与する設計、
              E3-9側で `x_imported_from_bundle: true` 相当のマーカーを
              エンティティに付与することをE3-9実装時の前提とする)を検出し、
              **既定でtrue**(除外対象)を返す

          ## 受け入れ条件
          - [ ] 合格軌跡のみが `build_sft_dataset` の出力に含まれ、不合格
                軌跡が含まれないことを確認する
          - [ ] 不合格軌跡+修正版ペア、および人間フィードバックペアが
                `build_dpo_dataset` の出力に統合されることを確認する
          - [ ] `opt_in=False` のプロダクトに属するレコードが
                `filter_by_opt_in` で除外されることを確認する
          - [ ] 共有バンドルインポート由来のマーカーを持つレコードが、
                明示的なオプトイン操作なしには学習データセットに含まれない
                (既定除外)ことを確認する

          ## 依存
          [E8-4], [E8-5] 完了後

          ## 成果物
          `services/agent-core/src/agent_core/learning/{dataset_builder,
          opt_in}.py`, 関連テスト

          ## トレーサビリティ
          FR-SL-05, FR-SL-10, DR-05 / 要件定義書 §5.6, §10

          ## 要件書引用
          > FR-SL-05 データセット化:合格軌跡→SFT、不合格+修正版ペアおよび
          > 人間の承認/差戻ペア→DPO。全件来歴管理。
          > FR-SL-10:実プロダクト情報を学習に用いる場合、プロダクトごとの
          > 明示的なオプトイン設定を必須とし、他社共有バンドル由来のデータ
          > は既定で学習対象外とすること。

      - key: E8-7
        title: "[E8-7] trainer QLoRA実装"
        labels: ["phase:4"]
        body: |
          ## 概要
          TRLベースのSFT/DPOトレーナーを実装する。Tier-L設定
          (3Bモデル/4bit量子化/LoRA rank≦16/seq長≦2K/gradient
          checkpointing)を既定とし、checkpoint再開・MLflow記録を実装する。
          本イシューはCPU+極小モデル(`tiny-random`系のダミーモデル)での
          スモークテストを完走させることを受け入れ条件とし、実GPU環境は
          不要とする。

          ## 対象ファイル
          - `services/trainer/pyproject.toml`: `trl`, `peft`, `transformers`,
            `bitsandbytes`(4bit量子化、CPU環境では関数境界でモック),
            `mlflow` の依存
          - `services/trainer/src/trainer/config.py`: `TrainingConfig`
            (モデル名、LoRA rank(既定16以下)、seq_len(既定2048以下)、
            4bit量子化フラグ、gradient_checkpointing フラグ、
            checkpoint保存間隔)
          - `services/trainer/src/trainer/sft.py`: `run_sft(dataset_path,
            config: TrainingConfig, resume_from_checkpoint: str | None)`:
            TRLの `SFTTrainer` を用いた学習ループ
          - `services/trainer/src/trainer/dpo.py`: `run_dpo(...)`:
            TRLの `DPOTrainer` を用いた学習ループ
          - `services/trainer/src/trainer/bnb_adapter.py`: bitsandbytes
            依存を関数境界でラップするモジュール(`load_model_4bit(...)`)。
            CPU環境やbitsandbytes未インストール環境ではこの関数をテストで
            モックし、実際の4bit量子化ロードをスキップできるようにする
            (関数境界モックの目的:GPU非搭載CI環境でもテストを完走させる
            ため)
          - MLflow記録: 各学習run開始時に `mlflow.start_run()`、
            ハイパーパラメータ・損失曲線・checkpoint成果物パスを記録

          ## 受け入れ条件
          - [ ] CPU環境+`hf-internal-testing/tiny-random-*` 系の極小
                ダミーモデルを用いて `run_sft` がスモーク完走する
                (数ステップの学習ループがエラーなく終了する)ことを
                確認する
          - [ ] `bnb_adapter.load_model_4bit` をモックした状態で
                `run_sft`/`run_dpo` が呼び出せることを確認する
                (bitsandbytes非搭載環境でのテスト実行可否を担保)
          - [ ] checkpoint保存後、`resume_from_checkpoint` 指定で学習を
                再開でき、状態(ステップ数等)が復元されることを確認する
                (NFR-08: スポット中断対策の前提となるcheckpoint再開性)
          - [ ] MLflowにrun記録(パラメータ・checkpointパス)が残ることを
                確認する
          - [ ] `TrainingConfig` のバリデーションで、LoRA rank>16や
                seq_len>2048をTier-L既定として警告する(またはエラーに
                する)ロジックがある

          ## 依存
          [E8-6] 完了後

          ## 成果物
          `services/trainer/src/trainer/{config,sft,dpo,bnb_adapter}.py`,
          関連テスト

          ## トレーサビリティ
          FR-SL-06, NFR-08, ENV-L-02, MR-02 / 要件定義書 §5.6, §7, §8, §9.2

          ## 要件書引用
          > FR-SL-06 学習:QLoRA(4bit+LoRA)によるSFT/DPOをtrainerコンテナで
          > 実行する。
          > ENV-L-02:学習は3B QLoRA(4bit、rank≦16、seq≦2K、gradient
          > checkpointing)を夜間バッチで実行。
          > NFR-08 可用性:学習ジョブはcheckpoint再開可能(スポット中断
          > 対策)。

      - key: E8-8
        title: "[E8-8] eval-runner評価ゲート+デプロイフック"
        labels: ["phase:4"]
        body: |
          ## 概要
          固定ベンチマークによる新旧モデル比較・昇格判定を行うeval-runnerを
          実装する。ベンチ定義スキーマ、新旧比較ロジック、昇格時の
          Ollamaアダプタ差替スクリプト(モック)、各段階の手動実行CLIを
          整備する。GGUF/AWQ変換手順もドキュメント化する(MR-04)。

          ## 対象ファイル
          - `services/eval-runner/src/eval_runner/bench_schema.py`:
            ベンチ問題のPydanticモデル(`category`: enum 6カテゴリ
            — PdM知識/優先順位判断/成果物生成/PMDF操作の正確性/
            プロダクト・プロジェクト区別/一般能力回帰、`question`,
            `expected_answer_criteria`, `scoring_method`)。最低300問の
            枠組みとして、各カテゴリ最低50問のダミー/サンプル問題を
            `services/eval-runner/bench/` に配置(DR-04の枠組み。
            全300問の実充実は運用フェーズでの継続タスクとし、本イシューでは
            スキーマと動作する枠組みの実装を主眼とする)
          - `services/eval-runner/src/eval_runner/compare.py`:
            `compare_models(baseline_scores: dict, new_scores: dict) ->
            PromotionDecision`: カテゴリ別スコアから、
            「PdMベンチ総合+10pt以上」かつ「一般能力回帰カテゴリの劣化
            5pt以内」の閾値判定ロジック(AC-04の枠組み)を実装
          - `services/eval-runner/src/eval_runner/deploy_hook.py`:
            `promote_model(adapter_path: str, ollama_url: str) -> None`:
            昇格判定がpromoteの場合に呼ばれるOllamaアダプタ差替処理。
            実Ollama環境が無い場合はHTTPモックサーバでの差替リクエスト
            確認に留める(モック実装)
          - `services/eval-runner/src/eval_runner/cli.py`: `typer` で
            `eval-runner run-bench`, `eval-runner compare`,
            `eval-runner promote` の各段階を個別手動実行可能にする
            (FR-SL-09)
          - `docs/gguf-awq-conversion.md`: GGUF(Ollama向け)/AWQ・GPTQ
            (vLLM向け)への変換パイプライン手順のドキュメント化(MR-04、
            実変換はローカルGPU環境が必要なため手順書のみ提供し、CI/自動
            テストの対象外とする)

          ## 受け入れ条件
          - [ ] `services/eval-runner/bench/` に6カテゴリ各最低50問
                (合計300問以上)のベンチ問題が配置され、
                `bench_schema.py` のモデルでバリデーションが通ることを
                確認する
          - [ ] ベースラインスコアと新モデルスコア(いずれもテスト用の
                固定値)から `compare_models` が閾値判定(promote/
                reject)を正しく返すことを確認する(PdM総合+10pt以上かつ
                一般能力回帰5pt以内→promote、それ以外→reject の境界値
                テストを含む)
          - [ ] `promote_model` がモックOllamaサーバへアダプタ差替リクエスト
                を送ることを確認する(実Ollama不要)
          - [ ] `eval-runner run-bench`/`compare`/`promote` の各CLIコマンドが
                個別に手動実行できることを統合テストで確認する(FR-SL-09)
          - [ ] `docs/gguf-awq-conversion.md` にGGUF/AWQ双方の変換手順が
                記載されている

          ## 依存
          [E8-4], [E8-7] 完了後

          ## 成果物
          `services/eval-runner/src/eval_runner/{bench_schema,compare,
          deploy_hook,cli}.py`, `services/eval-runner/bench/**`,
          `docs/gguf-awq-conversion.md`

          ## トレーサビリティ
          FR-SL-07, FR-SL-08, FR-SL-09, DR-04, MR-04 / 要件定義書 §5.6, §8, §10

          ## 要件書引用
          > FR-SL-07 評価ゲート:固定ベンチマーク(PdM知識・優先順位判断・
          > 成果物生成・PMDF操作の正確性・プロダクト/プロジェクト区別・
          > 一般能力回帰)で新旧比較し、閾値を満たす場合のみ昇格。
          > DR-04:評価ゲートは最低300問(6カテゴリ)を自作
          > AC-04:評価ゲートでFT後モデルがベース比 PdMベンチ総合+10pt
          > 以上、一般能力劣化5pt以内

  # =========================================================================
  # E9: 運用機能 [phase:5]
  # =========================================================================
  - key: E9
    title: "[E9] 運用機能"
    labels: [epic, "phase:5"]
    body: |
      ## 概要
      定常業務のオーケストレーション(scheduler)、予算監視と自動停止、
      ヘルスチェック・ログ集約、バックアップ/リストア、脆弱性スキャンCIを
      実装する。

      ## 含まれるサブイシュー
      - E9-1 scheduler
      - E9-2 予算監視と自動停止
      - E9-3 ヘルスチェック・ログ集約
      - E9-4 バックアップ/リストア
      - E9-5 脆弱性スキャンCI

      ## トレーサビリティ
      FR-OP-01〜04, SEC-06 / 要件定義書 §5.7
    subs:
      - key: E9-1
        title: "[E9-1] scheduler"
        labels: ["phase:5"]
        body: |
          ## 概要
          KPI監視(FR-PD-05)・週次レビュー(FR-PD-11)の定期起動と、自己学習
          ループの各段階(E8）を連結したフロー定義をcronベースで実行する
          schedulerを実装する(FR-OP-04)。

          ## 対象ファイル
          - `services/scheduler/pyproject.toml`: 軽量スケジューラライブラリ
            (`apscheduler` 等)の依存
          - `services/scheduler/src/scheduler/jobs.py`:
            - `trigger_kpi_monitoring()`: E5-6の `monitor_kpi` グラフを
              agent-core APIまたはタスクキュー(E5-1)経由で定期起動
              (例: 1時間ごと)
            - `trigger_weekly_review()`: E5-6の `weekly_review` グラフを
              週次起動(例: 毎週月曜9時)
            - `trigger_learning_loop()`: E8-2〜E8-8の各段階を順に呼び出す
              フロー定義(タスク合成→実行→評価→データセット化→学習→
              評価ゲート、失敗時は次段階へ進まず通知)
          - `services/scheduler/src/scheduler/main.py`: cron式設定
            (環境変数または設定ファイルでスケジュールを外出しし、
            コード変更なしで頻度調整可能にする)

          ## 受け入れ条件
          - [ ] `trigger_kpi_monitoring`/`trigger_weekly_review` が設定した
                cronスケジュールに従って呼び出されることをモックスケジューラ
                でのテストで確認する
          - [ ] `trigger_learning_loop` が各段階を順序通り呼び出し、
                途中段階が失敗した場合に後続段階が実行されないことを
                確認する
          - [ ] スケジュール設定が環境変数/設定ファイルから読み込まれ、
                コード変更なしで頻度を変更できることを確認する

          ## 依存
          [E5-6] 完了後

          ## 成果物
          `services/scheduler/src/scheduler/{jobs,main}.py`, 関連テスト

          ## トレーサビリティ
          FR-OP-04 / 要件定義書 §5.7

          ## 要件書引用
          > FR-OP-04:scheduler により定常業務(FR-PD-05, FR-PD-11)を
          > エージェントへ定期起動する。

      - key: E9-2
        title: "[E9-2] 予算監視と自動停止"
        labels: ["phase:5"]
        body: |
          ## 概要
          E4-3のコスト集計結果を用い、予算80%到達で警告イベントを発行、
          100%到達で学習ジョブ(trainer/eval-runner)を自動停止する
          (FR-OP-01)。Tier-Lではローカル分の予算監視として実装する
          (Tier-S側のAWS Budgets連携はE11-4で扱う)。

          ## 対象ファイル
          - `services/scheduler/src/scheduler/budget_monitor.py`:
            - 定期的に(例 1時間ごと)E4-3の `GET /costs/summary` を
              ポーリングし、`check_budget_threshold` (E4-3で実装済み)の
              結果が `warning` の場合はE3-10のイベントバス相当の通知
              (api-server経由でWebSocketイベント発行、またはメール等の
              通知手段は将来拡張とし本イシューでは内部イベント発行のみ
              実装)を送出する
            - `exceeded` の場合、trainer/eval-runnerジョブの起動を停止する
              (E9-1の `trigger_learning_loop` の実行前チェックとして
              予算超過フラグを確認し、超過時はジョブをスキップしてログに
              記録する)
          - `services/api-server/src/api_server/routers/costs.py`
            (E4-3で作成済み)に `POST /costs/budget-exceeded-flag` 相当の
            内部エンドポイント、または既存の `costs.budget` モジュールが
            提供する状態を直接参照する設計とする

          ## 受け入れ条件
          - [ ] 予算消化率が80%相当のテストデータで、警告イベントが
                発行されることを確認する
          - [ ] 予算消化率が100%相当のテストデータで、
                `trigger_learning_loop` の実行前チェックによりジョブが
                スキップされることを確認する(AC-09のローカル分に相当)
          - [ ] 予算消化率が80%未満の場合は通常通りジョブが実行される
                ことを確認する

          ## 依存
          [E4-3], [E8-7] 完了後

          ## 成果物
          `services/scheduler/src/scheduler/budget_monitor.py`, 関連テスト

          ## トレーサビリティ
          FR-OP-01, AC-09(ローカル分) / 要件定義書 §5.7, §13

          ## 要件書引用
          > FR-OP-01:月次コスト(API従量+AWSインフラ)を可視化し、予算80%で
          > 警告、100%で学習ジョブを自動停止する。

      - key: E9-3
        title: "[E9-3] ヘルスチェック・ログ集約"
        labels: ["phase:5"]
        body: |
          ## 概要
          全コンテナのヘルスチェックと構造化ログ集約規約を整備する
          (FR-OP-02)。

          ## 対象ファイル
          - `docker-compose.yml`(E4-4で追加したhealthcheckの網羅性を
            本イシューで最終確認・不足分を追加): 全常時稼働サービス
            (web-ui/api-server/agent-core/model-gateway/qdrant/minio/
            mlflow/scheduler/pmdf-store)に `healthcheck:` セクションを
            持たせる
          - `docs/logging-conventions.md`: 構造化ログ規約
            (JSON形式、必須フィールド: `timestamp`, `level`, `service`,
            `message`, `trace_id`(可能な場合))。各サービス(FastAPI/
            LangGraph/Node)でのstructlog/pino等の設定方針を記載
          - ログ集約: 本イシューではDocker Composeの標準ログドライバ
            (`json-file`)+ `docker compose logs` での横断確認を既定運用
            とし、将来のELK/Loki等への拡張ポイントをドキュメントに
            明記する(実際のログ集約基盤導入はスコープ外、規約整備が
            本イシューの主眼)

          ## 受け入れ条件
          - [ ] `docker compose --profile api-only ps` で全常時稼働
                サービスの `STATUS` 列に `healthy` が表示されることを
                確認する(E4-4のAC-01検証と合わせて実施)
          - [ ] 各サービスのログ出力が `docs/logging-conventions.md` に
                定めたJSON構造化フォーマットに従っていることを、
                各サービスのサンプルログ出力で確認する
          - [ ] `docker compose logs` で全サービスのログが横断的に確認
                できることを確認する

          ## 依存
          [E4-4] 完了後

          ## 成果物
          `docker-compose.yml`(healthcheck追記)、
          `docs/logging-conventions.md`

          ## トレーサビリティ
          FR-OP-02 / 要件定義書 §5.7

          ## 要件書引用
          > FR-OP-02:全コンテナのヘルスチェックとログ集約。

      - key: E9-4
        title: "[E9-4] バックアップ/リストア"
        labels: ["phase:5"]
        body: |
          ## 概要
          pmdf-store・KB・データセット・設定の一括バックアップとリストアを
          実装し、完全復元をテストで確認する(FR-OP-03)。

          ## 対象ファイル
          - `scripts/backup.sh`: 以下を1つのtarballへまとめる
            - pmdf-storeのGitリポジトリ全体(`.git`含む)
            - `kb/corpus/`
            - 学習データセット(E8の `data/` 配下、SFT/DPO/軌跡)
            - 設定ファイル群(`.env`は**除外**し、`.env.example`と
              autonomy設定等の非秘密設定のみ含める。SEC-01準拠で秘密情報を
              バックアップに含めない)
          - `scripts/restore.sh`: 上記tarballから各ディレクトリへ復元
          - Tier-L想定では出力先を外部ディスク相当のローカルパス
            (環境変数 `BACKUP_DEST_DIR` で指定)とする(Tier-SのS3出力は
            E11で扱う)

          ## 受け入れ条件
          - [ ] `scripts/backup.sh` を実行し、pmdf-store/kb/データセット/
                設定を含むtarballが生成されることを確認する
          - [ ] 生成したtarballから別ディレクトリへ `scripts/restore.sh`
                で復元し、元のpmdf-storeのGit履歴(コミット数・内容)が
                完全一致することを確認する(完全復元テスト)
          - [ ] `.env` 等の秘密情報ファイルがバックアップに含まれない
                ことを確認する

          ## 依存
          [E3-2] 完了後

          ## 成果物
          `scripts/backup.sh`, `scripts/restore.sh`

          ## トレーサビリティ
          FR-OP-03 / 要件定義書 §5.7, §9.2

          ## 要件書引用
          > FR-OP-03:PMDFリポジトリ・KB・データセット・モデル・設定の
          > 一括バックアップ/リストア(Tier-S:S3、Tier-L:外部ディスク)。

      - key: E9-5
        title: "[E9-5] 脆弱性スキャンCI"
        labels: ["phase:5"]
        body: |
          ## 概要
          コンテナイメージとPython/Node依存関係の定期脆弱性スキャンを
          GitHub Actionsワークフローとして整備する(SEC-06)。

          ## 対象ファイル
          - `.github/workflows/security-scan.yml`:
            - トリガー: `schedule`(週次cron)+ `workflow_dispatch`
              (手動実行可)
            - ジョブ1: `aquasecurity/trivy-action` でE4-4のDockerfile群
              から生成したイメージをスキャン(CRITICAL/HIGH脆弱性検出時に
              ワークフローを失敗させる、または通知のみに留めるかは
              `severity` 設定で明示)
            - ジョブ2: Python依存(`uv.lock`)とNode依存(`pnpm-lock.yaml`)の
              既知脆弱性スキャン(`pip-audit` / `pnpm audit` 等)

          ## 受け入れ条件
          - [ ] `security-scan.yml` が週次cronトリガーと手動トリガー
                (`workflow_dispatch`)の両方で起動できる設定になっている
                ことを確認する
          - [ ] trivyスキャンジョブが実際にE4-4のいずれかのDockerfileから
                ビルドしたイメージに対して実行され、結果がワークフロー
                サマリに出力されることを確認する(実行して確認、既知の
                脆弱性が検出されても本タスクではブロッキングにしない
                設定で初期導入する)
          - [ ] `pip-audit`/`pnpm audit` ジョブが依存関係の脆弱性一覧を
                出力することを確認する

          ## 依存
          [E4-4] 完了後

          ## 成果物
          `.github/workflows/security-scan.yml`

          ## トレーサビリティ
          SEC-06 / 要件定義書 §12

          ## 要件書引用
          > SEC-06:コンテナイメージの定期脆弱性スキャン。

  # =========================================================================
  # E10: E2E受け入れとドキュメント [phase:5]
  # =========================================================================
  - key: E10
    title: "[E10] E2E受け入れとドキュメント"
    labels: [epic, "phase:5"]
    body: |
      ## 概要
      サンプルプロダクトを用いたエンドツーエンドの受け入れ検証
      (AC-05〜08相当)と、運用ドキュメントの最終化を行う。本エピックの
      完了をもって初期リリーススコープ(Tier-L中心)の主要受け入れ基準を
      満たす。

      ## 含まれるサブイシュー
      - E10-1 サンプルプロダクトPMDFシード
      - E10-2 E2Eシナリオテスト
      - E10-3 バンドル往復・サニタイズE2E
      - E10-4 運用ドキュメント最終化

      ## トレーサビリティ
      AC-05〜08 / 要件定義書 §13
    subs:
      - key: E10-1
        title: "[E10-1] サンプルプロダクトPMDFシード"
        labels: ["phase:5"]
        body: |
          ## 概要
          FR-PD-01〜11の全業務を一巡させるための、サンプルプロダクト
          (架空のプロダクト、例: ECサイトの「ゲスト購入時の注文履歴閲覧」
          機能の例を要件定義書§6.2記述例から発展させたもの)のPMDF一式と、
          それを投入するスクリプトを整備する。

          ## 対象ファイル
          - `scripts/seed_sample_product/data/`: product 1件、
            stakeholder 2〜3件、persona 1〜2件、objective/metric 各1〜2件、
            roadmap_item 2〜3件、story 3〜5件(要件定義書§6.2の記述例を
            含む)、experiment 1件、decision 1〜2件、release 1件、
            risk 1〜2件、initiative 1件、report 1件、approval 1〜2件
            (承認済み・差し戻し済み双方のサンプルを含む)のYAMLファイル一式
          - `scripts/seed_sample_product/seed.py`: E3-2のpmdf-store経由
            (E3-3 API経由でも可)で上記データを一括投入するスクリプト。
            冪等性を考慮(既存データがあればスキップまたは上書き確認)
          - 全サンプルデータはE2-3のPydanticモデルでバリデーション済みで
            あることを前提とする

          ## 受け入れ条件
          - [ ] `scripts/seed_sample_product/seed.py` を実行すると、
                サンプルプロダクトの全エンティティ(14種別のうち作成した
                全種別)がpmdf-storeに投入されることを確認する
          - [ ] 投入されたデータがE2-1/E2-2のJSON Schemaに適合することを
                確認する(E2-9の `pmdf validate` CLIで検証)
          - [ ] サンプルstoryとして要件定義書§6.2の記述例
                (`story-01JZX4T8G2K9` 相当)が含まれることを確認する
          - [ ] approvalサンプルに承認済み・差し戻し済み双方のケースが
                含まれることを確認する

          ## 依存
          [E2-9], [E3-3] 完了後

          ## 成果物
          `scripts/seed_sample_product/{data/**,seed.py}`

          ## トレーサビリティ
          AC-05の前提データ / 要件定義書 §6.2, §13

      - key: E10-2
        title: "[E10-2] E2Eシナリオテスト"
        labels: ["phase:5"]
        body: |
          ## 概要
          Playwright+モックLLMを用い、AC-05(FR-PD-01〜11の全業務がUI経由で
          一巡できる: 起案→承認→実行→記録)とAC-06(L1業務が承認レコード
          なしでは実行できないことの確認、E3-6で実装済みのAPIレベルテストを
          UI経由でも再確認)をE2Eテストとして実装する。

          ## 対象ファイル
          - `services/web-ui/e2e/full_pdm_cycle.spec.ts`: E10-1のサンプル
            プロダクトを用い、
            1. ビジョン更新起案(agent-core、モックLLM応答固定)→
               承認キュー(E7-4)で承認→実行完了確認(E7-5でproduct.vision
               変更を確認)
            2. ロードマップ更新の同様のフロー
            3. バックログ運用(story起票、L2のため即時反映、E7-5で確認)
            4. 実験管理(experimentエンティティの作成・結果記録)
            5. リリース判断起案→承認→実行
            6. Decision Record自動記録(L3、承認不要で記録されることを確認)
            7. 週次レビュー起案→承認キューに要判断事項が現れることを確認
            の一連をE2Eで検証する(モックLLM: `services/agent-core`の
            テスト用モックサーバまたはmodel-gatewayのモックバックエンドを
            起動し、決定的な応答を返す構成でPlaywright実行前にセットアップ
            する)
          - `services/web-ui/e2e/approval_bypass_ui.spec.ts`: UIから
            L1業務(例: ビジョン変更)を承認せずに直接実行しようとする操作
            (存在するならAPIを直接叩くテスト、またはUI上に実行不可である
            ことの表示確認)を行い、E3-6のAPIレベルの403(既存テスト)と
            合わせて、UI上でも未承認では実行系ボタンが無効化/表示されない
            ことを確認する(AC-06の補完)

          ## 受け入れ条件
          - [ ] `full_pdm_cycle.spec.ts` がFR-PD-01〜11に相当する一連の
                業務フローをUI経由で一巡し、各段階でPMDFの状態変化が
                期待通りであることを確認する(**AC-05**)
          - [ ] `approval_bypass_ui.spec.ts` で、承認レコードがない状態
                ではL1業務の実行操作がUI上でブロックされる、または
                実行を試みてもエラー表示になることを確認する(**AC-06**の
                UI側検証)
          - [ ] 両E2Eテストがモックバックエンドのみで実行され、実際の
                LLM APIキーを必要としないことを確認する(CI実行可能性の
                担保)

          ## 依存
          [E7全件], [E5全件], [E10-1] 完了後

          ## 成果物
          `services/web-ui/e2e/{full_pdm_cycle,approval_bypass_ui}.spec.ts`

          ## トレーサビリティ
          AC-05, AC-06 / 要件定義書 §13

          ## 要件書引用
          > AC-05:サンプルプロダクト1件について、FR-PD-01〜11の全業務が
          > UI経由で一巡できる(起案→承認→実行→記録)
          > AC-06:L1業務がAPI直叩きを含め承認レコードなしでは実行できない
          > ことをテストで確認する

      - key: E10-3
        title: "[E10-3] バンドル往復・サニタイズE2E"
        labels: ["phase:5"]
        body: |
          ## 概要
          バンドルのexport→新環境import→全エンティティ・参照整合・添付
          ハッシュ一致(AC-07)、および共有プロファイルでのマスキング
          (AC-08)をE2Eで検証する。

          ## 対象ファイル
          - `services/web-ui/e2e/bundle_roundtrip.spec.ts`(または
            `services/api-server/tests/test_e2e_bundle_roundtrip.py` として
            APIレベルE2Eでもよいが、E7-8のUIを実際に経由する形を既定と
            する):
            1. E10-1のサンプルプロダクト(添付ファイル付きエンティティを
               1件以上含む)をE7-8のExport画面からダウンロード
            2. 別の空pmdf-store環境(テスト用に新規初期化)へE7-8の
               Import画面からアップロード→差分プレビュー(全件`new`のはず)
               →適用
            3. 適用後、元環境と新環境の全エンティティ内容・参照整合・
               添付ファイルのSHA-256ハッシュが一致することをアサーション
          - `services/web-ui/e2e/bundle_sanitize.spec.ts`:
            E2-8の共有プロファイルを指定してエクスポートし、ダウンロード
            したバンドルを展開して、指定フィールド(内部コスト・個人名・
            非公開指標値相当のテストデータ)がマスキングされていることを
            確認する

          ## 受け入れ条件
          - [ ] `bundle_roundtrip.spec.ts` で、export→import後の全
                エンティティ内容が一致し、参照整合エラーがなく、添付ハッシュ
                が一致することを確認する(**AC-07**)
          - [ ] `bundle_sanitize.spec.ts` で、共有プロファイル指定
                エクスポート結果に指定フィールドの平文が含まれず、
                マスキング済みであることを確認する(**AC-08**)

          ## 依存
          [E3-9], [E7-8] 完了後

          ## 成果物
          `services/web-ui/e2e/{bundle_roundtrip,bundle_sanitize}.spec.ts`

          ## トレーサビリティ
          AC-07, AC-08 / 要件定義書 §13

          ## 要件書引用
          > AC-07:PMDFバンドルのエクスポート→別環境へのインポートで、全
          > エンティティ・参照整合・添付ハッシュが一致する
          > AC-08:共有プロファイルでのエクスポートで指定フィールドが
          > マスキングされている

      - key: E10-4
        title: "[E10-4] 運用ドキュメント最終化"
        labels: ["phase:5"]
        body: |
          ## 概要
          Tier-Lセットアップ手順、運用規程(責任分界)、ライセンス台帳、
          ローカル検証チェックリスト(GPU系AC-03/04/10の人手手順)を
          ドキュメントとして最終化する。

          ## 対象ファイル
          - `docs/setup-tier-l.md`: Windows/WSL2環境でのセットアップ手順
            (Docker Desktop設定、NVIDIA Container Toolkit設定、
            `docker compose --profile local-gpu up` までの手順、
            トラブルシューティング)
          - `docs/operations-policy.md`: 運用規程。§11の責任分界
            (L1業務の最終責任は承認した人間に、L2/L3業務の運用責任は
            自律レベルを設定した管理者に帰属する旨)を明文化
          - `docs/license-ledger.md`: 基盤モデル・主要ライブラリ
            (transformers, TRL, peft, LiteLLM, LangGraph, Qdrant,
            MLflow等)のライセンス種別(改変・商用・出力利用条件)を
            一覧表化
          - `docs/local-verification-checklist.md`: GPU実機を要する
            受け入れ基準(AC-03: 自己学習ループ1周無人完走、AC-04:
            評価ゲート閾値判定、AC-10: 7B Q4推論のVRAM 8GB内安定稼働
            100ターン連続)について、実施者がローカル環境で手動検証する
            際のチェックリスト(前提条件、実行コマンド、期待結果、
            記録すべきログ・メトリクス)

          ## 受け入れ条件
          - [ ] `docs/setup-tier-l.md` に従って新規Windows環境で
                `docker compose --profile local-gpu config` まで到達できる
                (実GPU確認は対象外、手順の完全性を人手でレビューする)
          - [ ] `docs/operations-policy.md` に§11の責任分界の要点が
                反映されている
          - [ ] `docs/license-ledger.md` に主要依存ライブラリ全てのライセンス
                種別が記載されている
          - [ ] `docs/local-verification-checklist.md` にAC-03/04/10それぞれ
                の実施手順・期待結果・記録項目が明記されている

          ## 依存
          [E10-2] 完了後

          ## 成果物
          `docs/{setup-tier-l,operations-policy,license-ledger,
          local-verification-checklist}.md`

          ## トレーサビリティ
          §9.2, §11, AC-03/04/10 / 要件定義書 §9.2, §11, §13

          ## 要件書引用
          > 3. 責任分界:エージェントの起案・実行はすべて監査ログと
          > provenanceで人間の承認者に紐づく。L1業務の最終責任は承認した
          > 人間に、L2/L3業務の運用責任は自律レベルを設定した管理者に
          > 帰属する旨を運用規程に明記する。

  # =========================================================================
  # E11: Tier-S AWSデプロイ [labels: epic, deferred]
