  # =========================================================================
  - key: E11
    title: "[E11] Tier-S AWSデプロイ"
    labels: [epic, deferred]
    body: |
      ## 概要
      **本イシューは将来実装。現時点で着手しない。**

      Tier-S(AWS上位環境、月額10万円上限)へのデプロイを実現するための
      インフラ・学習ジョブ・公開経路・予算監視・環境間互換性・シークレット
      管理をまとめたエピックである。初期リリースはTier-L(ローカル環境)を
      主眼としており、本エピックは登録のみ行い実装には着手しない。
      着手する場合は、E1〜E10で確立されたTier-L向けの疎結合アーキテクチャ
      (設計原則1〜4)を前提に、`docker-compose.yml` の `profiles` と
      `.env` の差分のみでAWS環境へ展開できることを検証しながら進める。

      ## 含まれるサブイシュー(いずれも将来実装・現時点で未着手)
      - E11-1 IaC基盤(Terraform)
      - E11-2 スポット学習ジョブ
      - E11-3 HTTPS公開
      - E11-4 AWS Budgets連動予算監視
      - E11-5 Tier-S⇄Tier-L成果物互換検証
      - E11-6 SSM Parameter Storeシークレット管理+Cognitoメール認証検討

      ## トレーサビリティ
      ENV-S-01〜04, SEC-01〜03, ENV-C-01/02, AC-09 / 要件定義書 §9.1, §9.3
    subs:
      - key: E11-1
        title: "[E11-1] IaC基盤(Terraform: VPC/ECR/S3/常時稼働EC2)"
        labels: [deferred]
        body: |
          ## 概要
          **本イシューは将来実装。現時点で着手しない。**

          Terraformを用い、Tier-S環境の基盤(VPC、ECR、S3、常時稼働EC2
          t4g.medium)を構築するIaCを整備する。

          ## 想定対象ファイル(将来実装時)
          - `infra/terraform/tier-s/{vpc,ecr,s3,ec2}.tf`
          - 常時稼働EC2(t4g.medium)にui/api/gateway/tracking/scheduler/
            Qdrant/pmdf-storeを同居させる構成(§9.1の費目表に対応)

          ## 受け入れ条件(将来実装時)
          - [ ] `terraform plan` が成功し、VPC/ECR/S3/EC2が計画通り
                生成されることを確認する
          - [ ] 常時稼働EC2のコストが§9.1の目安(月額8,000円程度)の
                範囲に収まるインスタンスタイプ・構成であることを確認する

          ## 依存
          なし(ただし着手はE1〜E10完了後を想定)

          ## トレーサビリティ
          §9.1 / 要件定義書 §9.1

          ## 要件書引用
          > | 常時稼働基盤 | t4g.medium 等 ×1(ui/api/gateway/tracking/
          > scheduler/Qdrant/pmdf-store同居)+EBS | 〜8,000円 |

      - key: E11-2
        title: "[E11-2] スポット学習ジョブ(checkpoint→S3、アイドル30分自動停止)"
        labels: [deferred]
        body: |
          ## 概要
          **本イシューは将来実装。現時点で着手しない。**

          学習ジョブをEC2スポット(またはSageMaker Trainingスポット)で
          実行し、checkpointをS3へ定期保存、アイドル30分でGPUインスタンス
          を自動停止する仕組みを整備する(ENV-S-01, ENV-S-02)。

          ## 想定対象ファイル(将来実装時)
          - `infra/terraform/tier-s/spot_training.tf`
          - `scripts/tier-s/idle_shutdown_watcher.py`

          ## 受け入れ条件(将来実装時)
          - [ ] スポットインスタンスでE8-7のtrainerジョブが実行でき、
                checkpointがS3へ定期保存されることを確認する
          - [ ] アイドル30分でインスタンスが自動停止することを確認する

          ## 依存
          [E11-1] 完了後(将来)

          ## トレーサビリティ
          ENV-S-01, ENV-S-02 / 要件定義書 §9.1

          ## 要件書引用
          > ENV-S-01:学習ジョブはEC2スポット(またはSageMaker Trainingスポット)
          > で実行し、checkpointをS3へ定期保存する。
          > ENV-S-02:GPUインスタンスはアイドル30分で自動停止する。

      - key: E11-3
        title: "[E11-3] HTTPS公開(ALB+ACMまたはCloudflare Tunnel)"
        labels: [deferred]
        body: |
          ## 概要
          **本イシューは将来実装。現時点で着手しない。**

          web-ui(および同一経路のapi-server)のHTTPS公開を、ALB+ACMまたは
          Cloudflare Tunnel等の低コスト構成で実現する。閲覧者(他社)
          アクセスはこの経路のみとする(ENV-S-04, SEC-02)。

          ## 想定対象ファイル(将来実装時)
          - `infra/terraform/tier-s/{alb,acm}.tf` または
            `infra/cloudflare-tunnel/config.yml`

