          - [ ] バンドルアップロード後、`conflict` 種別のエンティティが
                一覧表示され、各項目で「取込側」「既存側」を選択できる
                ことを確認する
          - [ ] 選択後に手動編集導線を開き、編集した内容が適用時に反映
