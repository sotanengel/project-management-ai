      - key: E11-4
        title: "[E11-4] AWS Budgets連動予算監視(月10万円、80%警告/100%停止)"
        labels: [deferred]
        body: |
          ## 概要
          **本イシューは将来実装。現時点で着手しない。**

          AWS Budgetsとゲートウェイのコスト計測(E4-3)を合算監視し、
          FR-OP-01の自動停止と連動させる(ENV-S-03, AC-09)。

          ## 想定対象ファイル(将来実装時)
          - `infra/terraform/tier-s/budgets.tf`
          - `services/scheduler/src/scheduler/aws_budget_integration.py`

          ## 受け入れ条件(将来実装時)
          - [ ] AWS Budgetsで月10万円の予算アラートが80%/100%で発火する
                ことを確認する
          - [ ] E9-2のローカル予算監視ロジックとAWS Budgets通知を統合し、
                100%到達時に学習ジョブが自動停止することを確認する

          ## 依存
