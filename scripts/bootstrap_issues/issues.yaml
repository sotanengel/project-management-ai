      - key: E11-6
        title: "[E11-6] SSM Parameter Storeシークレット管理+Cognitoメール認証検討"
        labels: [deferred]
        body: |
          ## 概要
          **本イシューは将来実装。現時点で着手しない。**

          Tier-S環境における秘密情報管理をSSM Parameter Storeで実現し、
          将来のCognitoメール認証連携(ユーザーのグローバル開発標準:
          AWSデプロイアプリケーションではメールアドレスによる認証・
          確認方式を組み込むこと)を検討する。

          ## 想定対象ファイル(将来実装時)
          - `infra/terraform/tier-s/ssm_parameters.tf`
          - `docs/tier-s-cognito-email-auth-design.md`(Cognitoメール
            確認/メールOTP、メール検証付きサインアップの設計検討)

          ## 受け入れ条件(将来実装時)
          - [ ] APIキー・クラウド認証情報がSSM Parameter Store経由で
                コンテナへ注入され、リポジトリ・イメージに含まれないことを
                確認する(SEC-01)
          - [ ] Cognitoメール認証(メール確認/OTP)の設計検討ドキュメントが
                作成され、E3-4のメール+パスワード認証からの移行方針が
                明記されている

          ## 依存
          [E11-1], [E3-4] 完了後(将来)

          ## トレーサビリティ
          SEC-01, SEC-03 / 要件定義書 §12、ユーザー標準(AWSデプロイと
          メール認証)

